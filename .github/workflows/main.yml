name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor
        run: npm install

      - name: Init Capacitor
        run: npx cap init "varoone" "com.gabasstudio.varoone" --web-dir="."

      - name: Add Android platform
        run: npx cap add android

      - name: Copy Tapsell Plugin files
        run: |
          cp TapsellPlugin.java android/app/src/main/java/com/gabasstudio/varoone/
          cp MainActivity.java android/app/src/main/java/com/gabasstudio/varoone/
          mkdir -p android/app/src/main/res/xml
          cp network_security_config.xml android/app/src/main/res/xml/

      - name: Add Tapsell SDK to build.gradle
        run: |
          sed -i "/dependencies {/a\\    implementation 'ir.tapsell.sdk:tapsell-sdk-android:4.9.10'" android/app/build.gradle
          echo -e "\nrepositories { maven { url 'https://maven.tapsell.ir' } }" >> android/app/build.gradle

      - name: Add network security config to AndroidManifest
        run: |
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: varoone-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
