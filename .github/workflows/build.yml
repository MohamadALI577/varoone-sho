name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create www folder and move web files
        run: |
          mkdir -p www
          cp index.html www/
          cp -r assets www/ 2>/dev/null || true
          cp -r fonts www/ 2>/dev/null || true
          cp -r music www/ 2>/dev/null || true
          cp -r res www/ 2>/dev/null || true
          cp -r resource www/ 2>/dev/null || true

      - name: Update capacitor.config.json webDir
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.gabasstudio.varoone",
            "appName": "وارونه شو",
            "webDir": "www",
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: Install Capacitor
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy Tapsell Plugin files
        run: |
          cp TapsellPlugin.java android/app/src/main/java/com/gabasstudio/varoone/
          cp MainActivity.java android/app/src/main/java/com/gabasstudio/varoone/
          mkdir -p android/app/src/main/res/xml
          cp network_security_config.xml android/app/src/main/res/xml/

      - name: Add Tapsell SDK to build.gradle
        run: |
          sed -i "/dependencies {/a\\    implementation 'ir.tapsell.sdk:tapsell-sdk-android:4.9.10'" android/app/build.gradle

      - name: Add Tapsell maven repository
        run: |
          sed -i "/repositories {/a\\        maven { url 'https://maven.tapsell.ir' }" android/build.gradle

      - name: Add network security config to AndroidManifest
        run: |
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' android/app/src/main/AndroidManifest.xml

      - name: Install ImageMagick and copy app icon
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          ICO_SRC="res/icon/android/icon.png"
          if [ -f "$ICO_SRC" ]; then
            for size in "48:mdpi" "72:hdpi" "96:xhdpi" "144:xxhdpi" "192:xxxhdpi"; do
              px="${size%%:*}"
              dpi="${size##*:}"
              DIR="android/app/src/main/res/mipmap-${dpi}"
              mkdir -p "$DIR"
              convert "$ICO_SRC" -resize "${px}x${px}" "$DIR/ic_launcher.png"
              convert "$ICO_SRC" -resize "${px}x${px}" "$DIR/ic_launcher_round.png"
            done
            echo "✅ آیکون کپی شد"
          else
            echo "⚠️ آیکون پیدا نشد: $ICO_SRC"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: varoone-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
